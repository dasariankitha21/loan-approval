<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Prediction</title>

    <style>

        body{
            background:#f2f2f2;
            font-family:Arial;
        }

        .container{
            width:550px;
            margin:auto;
            margin-top:40px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        h1{
            text-align:center;
            color:#0d6efd;
        }

        table{
            width:100%;
        }

        td{
            padding:8px;
        }

        input,select{

            width:100%;
            padding:8px;
        }

        button{

            width:100%;
            padding:10px;
            background:#0d6efd;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{

            background:#084298;
        }

        h2{
            color:green;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="container">

<h1>Loan Approval Prediction</h1>

<form method="POST">

{% csrf_token %}

<table>

<tr>
<td>Loan ID</td>

<td>

<input type="text" name="loan_id" value="LP000000" required>

</td>
</tr>

<tr>
<td>Gender</td>

<td>

<select name="gender">

<option>Male</option>
<option>Female</option>

</select>

</td>
</tr>


<tr>
<td>Married</td>

<td>

<select name="married">

<option>Yes</option>
<option>No</option>

</select>

</td>

</tr>


<tr>

<td>Dependents</td>

<td>

<input type="number" name="dependents" required>

</td>

</tr>



<tr>

<td>Education</td>

<td>

<select name="education">

<option>Graduate</option>
<option>Not Graduate</option>

</select>

</td>

</tr>



<tr>

<td>Self Employed</td>

<td>

<select name="self">

<option>Yes</option>
<option>No</option>

</select>

</td>

</tr>



<tr>

<td>Applicant Income</td>

<td>

<input type="number" name="income" required>

</td>

</tr>



<tr>

<td>Coapplicant Income</td>

<td>

<input type="number" name="coincome">

</td>

</tr>



<tr>

<td>Loan Amount</td>

<td>

<input type="number" name="loanamount" required>

</td>

</tr>



<tr>

<td>Loan Amount Term</td>

<td>

<input type="number" name="term" required>

</td>

</tr>



<tr>

<td>Credit History</td>

<td>

<select name="credit">

<option>1</option>
<option>0</option>

</select>

</td>

</tr>



<tr>

<td>Property Area</td>

<td>

<select name="property">

<option>Urban</option>
<option>Semiurban</option>
<option>Rural</option>

</select>

</td>

</tr>



<tr>

<td colspan="2">

<button type="submit">

Predict Loan

</button>

</td>

</tr>

</table>

</form>

<h2>{{result}}</h2>
{% if probability %}
<p style="text-align:center;color:#555;">Probability: {{ probability }}</p>
{% endif %}

</div>

</body>

</html>
